name: lint
on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    permissions:
      checks: write
      contents: read
      pull-requests: read
    uses: charmbracelet/meta/.github/workflows/lint.yml@main
    with:
      golangci_path: .golangci.yml
      golangci_version: v2.9
      timeout: 10m
      os: '["ubuntu-latest"]'
